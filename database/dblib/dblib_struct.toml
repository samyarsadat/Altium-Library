# Altium .DbLib file structure segments.

file_beginning = """
[OutputDatabaseLinkFile]
Version=1.1

[DatabaseLinks]
ConnectionString=Provider=MSDASQL.1;Persist Security Info=False;Extended Properties="DRIVER=SQLite3 ODBC Driver;Database={db_path};"
AddMode=3
RemoveMode=1
UpdateMode=2
ViewMode=0
LeftQuote=[
RightQuote=]
QuoteTableNames=1
UseTableSchemaName=0
DefaultColumnType=VARCHAR(255)
LibraryDatabaseType=
LibraryDatabasePath=
DatabasePathRelative=0
TopPanelCollapsed=0
LibrarySearchPath=
OrcadMultiValueDelimiter=,
SearchSubDirectories=0
SchemaName=
LastFocusedTable=
"""

table_entry = """
[Table{num}]
SchemaName=
TableName={name}
Enabled=True
UserWhere=0
UserWhereText=
"""

field_map_entry = """
[FieldMap{num}]
Options=FieldName={table_name}.{field_name}|TableNameOnly={table_name}|FieldNameOnly={field_name}|FieldType={field_type}|ParameterName={param_name}|VisibleOnAdd=False|AddMode=0|RemoveMode=0|UpdateMode=0
"""